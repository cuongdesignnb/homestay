server
{
    listen 80;
    listen 443 ssl http2 ;
    server_name condaoislandtour.com;
    index index.html index.php index.htm default.php default.htm default.html;
    root /www/wwwroot/condaoislandtour.com/backend/public;
    include /www/server/panel/vhost/nginx/extension/condaoislandtour.com/*.conf;

    #CERT-APPLY-CHECK--START
    # Configuration related to file verification for SSL certificate application - Do not delete
    include /www/server/panel/vhost/nginx/well-known/condaoislandtour.com.conf;
    #CERT-APPLY-CHECK--END
    #SSL-START SSL related configuration, do NOT delete or modify the next line of commented-out 404 rules
    #error_page 404/404.html;
    #HTTP_TO_HTTPS_START
    if ($server_port !~ 443){
        rewrite ^(/.*)$ https://$host$1 permanent;
    }
    #HTTP_TO_HTTPS_END
        ssl_certificate    /www/server/panel/vhost/cert/condaoislandtour.com/fullchain.pem;
        ssl_certificate_key    /www/server/panel/vhost/cert/condaoislandtour.com/privkey.pem;
        ssl_protocols TLSv1.1 TLSv1.2 TLSv1.3;
        ssl_ciphers EECDH+CHACHA20:EECDH+CHACHA20-draft:EECDH+AES128:RSA+AES128:EECDH+AES256:RSA+AES256:EECDH+3DES:RSA+3DES:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_tickets on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;
        add_header Strict-Transport-Security "max-age=31536000";
        error_page 497  https://$host$request_uri;
    
    #SSL-END

    #ERROR-PAGE-START  Error page configuration, allowed to be commented, deleted or modified
    error_page 404 /404.html;
    error_page 502 /502.html;
    #ERROR-PAGE-END

    #PHP-INFO-START  PHP reference configuration, allowed to be commented, deleted or modified
    include enable-php-82.conf;
    #PHP-INFO-END

    # =====================================================
    # LARAVEL + VUE.JS ROUTING CONFIGURATION
    # =====================================================

    # Handle Laravel API routes (MUST be before / location)
    location ^~ /api {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Handle Laravel payment routes (SePay checkout, callbacks)
    location ^~ /payment {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Handle Laravel admin routes (if any)
    location ^~ /admin {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Handle Vue.js SPA routing (frontend) - MUST be last
    # Detect social media crawlers and serve dynamic OG meta tags
    set $is_crawler 0;
    if ($http_user_agent ~* "facebookexternalhit|Facebot|Twitterbot|LinkedInBot|WhatsApp|TelegramBot|Slackbot|Discordbot|Pinterest|Zalobot|ZaloSharePreview|Zalo|SkypeUriPreview|Viber|Line") {
        set $is_crawler 1;
    }

    location / {
        if ($is_crawler = 1) {
            rewrite ^(.*)$ /social-meta.php?_url=$1 last;
        }
        try_files $uri $uri/ /index.html;
    }

    # PHP processing for Laravel
    location ~ \.php$ {
        fastcgi_pass unix:/tmp/php-cgi-82.sock;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;

        # Laravel specific headers
        fastcgi_param HTTP_AUTHORIZATION $http_authorization;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_param PATH_TRANSLATED $document_root$fastcgi_path_info;
    }

    #REWRITE-START URL rewrite rule reference, any modification will invalidate the rewrite rules set by the panel
    # include /www/server/panel/vhost/rewrite/condaoislandtour.com.conf;
    #REWRITE-END

    # =====================================================
    # SECURITY & PERFORMANCE
    # =====================================================

    # Forbidden files or directories
    location ~ ^/(\.user.ini|\.htaccess|\.git|\.env|\.svn|\.project|LICENSE|README.md|composer\.json|composer\.lock|package\.json|webpack\.config\.js)
    {
        return 404;
    }

    # Block access to Laravel sensitive directories (except public storage)
    location ~ ^/(bootstrap|config|database|resources|routes|tests|vendor)/ {
        deny all;
        return 404;
    }

    # Block direct access to storage/app (but allow storage/app/public via /storage alias)
    location ~ ^/storage/(app|framework|logs)/ {
        deny all;
        return 404;
    }

    # Block access to Vue.js source files
    location ~ ^/(src|node_modules)/ {
        deny all;
        return 404;
    }

    # Directory verification related settings for one-click application for SSL certificate
    location ~ \.well-known{
        allow all;
    }

    #Prohibit putting sensitive files in certificate verification directory
    if ( $uri ~ "^/\.well-known/.*\.(php|jsp|py|js|css|lua|ts|go|zip|tar\.gz|rar|7z|sql|bak)$" ) {
        return 403;
    }

    # Handle Laravel storage files (uploads, media)
    location /storage {
        alias /www/wwwroot/condaoislandtour.com/backend/storage/app/public;
        try_files $uri =404;
    }

    # Static assets caching
    location ~* \.(gif|jpg|jpeg|png|bmp|swf|ico|svg|webp)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        error_log /dev/null;
        access_log /dev/null;
    }

    location ~* \.(js|css|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        error_log /dev/null;
        access_log /dev/null;
    }

    # Handle Vue.js assets with hash (cache busting)
    location ~* \.(js|css)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Gzip compression for better performance
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/xml+rss application/json;

    access_log  /www/wwwlogs/condaoislandtour.com.log;
    error_log  /www/wwwlogs/condaoislandtour.com.error.log;
}